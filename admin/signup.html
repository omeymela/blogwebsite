<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Style Edit · Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fcf9f7;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ===== SIGNUP CONTAINER ===== */
        .signup-container {
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.08);
            padding: 3rem 3.5rem;
            max-width: 480px;
            width: 100%;
            border: 1px solid #f0ebe5;
            position: relative;
            overflow: hidden;
        }

        .signup-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #c9a07a, #b88e68);
        }

        /* ===== LOGO ===== */
        .signup-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .signup-logo .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #1a1a2e;
        }

        .signup-logo .logo span {
            color: #c9a07a;
        }

        .signup-logo .logo i {
            color: #c9a07a;
            margin-right: 0.3rem;
        }

        .signup-logo p {
            color: #8a8a9e;
            font-size: 0.95rem;
            margin-top: 0.3rem;
        }

        /* ===== FORM ===== */
        .signup-form h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            margin-bottom: 0.3rem;
            text-align: center;
        }

        .signup-form h2 span {
            color: #c9a07a;
        }

        .signup-form .subtitle {
            text-align: center;
            color: #8a8a9e;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.3rem;
            font-size: 0.85rem;
            color: #2d2d44;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border: 1px solid #f0ebe5;
            border-radius: 0.8rem;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            background: #fcf9f7;
            color: #1a1a2e;
            transition: 0.3s;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #c9a07a;
            box-shadow: 0 0 0 3px rgba(201, 160, 122, 0.1);
            background: #ffffff;
        }

        .form-group .input-with-icon {
            position: relative;
        }

        .form-group .input-with-icon i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #8a8a9e;
            font-size: 1rem;
        }

        .form-group .input-with-icon input {
            padding-left: 2.8rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group .password-hint {
            font-size: 0.75rem;
            color: #8a8a9e;
            margin-top: 0.3rem;
        }

        .form-group .password-hint i {
            margin-right: 0.2rem;
        }

        .terms {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: #5a5a72;
        }

        .terms input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #c9a07a;
            margin-top: 0.2rem;
            cursor: pointer;
            flex-shrink: 0;
        }

        .terms a {
            color: #c9a07a;
            font-weight: 500;
            transition: 0.3s;
        }

        .terms a:hover {
            color: #b88e68;
        }

        .btn-signup {
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 50px;
            background: #c9a07a;
            color: #ffffff;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .btn-signup:hover {
            background: #b88e68;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(201, 160, 122, 0.3);
        }

        /* ===== LOGIN LINK ===== */
        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #5a5a72;
        }

        .login-link a {
            color: #c9a07a;
            font-weight: 600;
            transition: 0.3s;
        }

        .login-link a:hover {
            color: #b88e68;
        }

        /* ===== BACK LINK ===== */
        .back-link {
            text-align: center;
            margin-top: 1rem;
        }

        .back-link a {
            color: #8a8a9e;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .back-link a:hover {
            color: #c9a07a;
        }

        .back-link a i {
            margin-right: 0.3rem;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .signup-container {
                padding: 2rem 1.5rem;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            .signup-logo .logo {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="signup-container">

        <!-- ===== LOGO ===== -->
        <div class="signup-logo">
            <div class="logo">
                <i class="fas fa-scroll"></i> The <span>Style</span> Edit
            </div>
            <p>Fashion & Lifestyle Blog</p>
        </div>

        <!-- ===== SIGNUP FORM ===== -->
        <div class="signup-form">
            <h2>Create <span>Account</span></h2>
            <p class="subtitle">Join as a contributor or author</p>

            <form onsubmit="event.preventDefault(); alert('Account created successfully! Please check your email to verify.'); window.location.href='login.html';">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstname">First Name</label>
                        <input type="text" id="firstname" placeholder="John" required />
                    </div>
                    <div class="form-group">
                        <label for="lastname">Last Name</label>
                        <input type="text" id="lastname" placeholder="Doe" required />
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="Enter your email" required />
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Create a password" required />
                    </div>
                    <div class="password-hint">
                        <i class="fas fa-info-circle"></i> Minimum 8 characters with at least one number
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <div class="input-with-icon">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" id="confirm-password" placeholder="Confirm your password" required />
                    </div>
                </div>

                <div class="form-group">
                    <label for="role">I want to...</label>
                    <select id="role">
                        <option value="contributor">Write as a Contributor</option>
                        <option value="author">Become an Author</option>
                        <option value="editor">Apply as Editor</option>
                    </select>
                </div>

                <div class="terms">
                    <input type="checkbox" id="terms" required />
                    <label for="terms">
                        I agree to the <a href="#">Terms of Service</a> and 
                        <a href="#">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="btn-signup">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <!-- ===== LOGIN LINK ===== -->
            <div class="login-link">
                Already have an account? <a href="login.html">Log In</a>
            </div>

            <!-- ===== BACK LINK ===== -->
            <div class="back-link">
                <a href="../index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>

    </div>

</body>
</html>
